   <!DOCTYPE html>
<html>
  <head>
    <title>Phrase Clicker</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mainStyle.css">
  </head>

  <body>

  
    <input type="radio" name="page" id="p1" checked>
    <input type="radio" name="page" id="p2">
    <input type="radio" name="page" id="p3">
    <input type="radio" name="page" id="p4">
    <input type="radio" name="page" id="p5">

    <input type="radio" name="page" id="p9">
    <input type="radio" name="page" id="p10">

<div class="screen s1">
  <label for="p2" class="wave-rainbow">
    <span>O</span><span>o</span><span>o</span><span>h</span>
  </label>
</div>

<div class="screen s2">
  <label for="p3" class="flow-I">I love you</label>
</div>

<div class="screen s3">
  <label for="p4">so much</label>
</div>

<div class="screen s4">
  <label for="p5">it hurts</label>
</div>

<div class="screen s5">
  <label for="p6">it hurts</label>
</div>

<div class="screen s6">
  <label for="p7">and I can't</label>
</div>

<div class="screen s7">
  <label for="p8">stop the tears</label>
</div>

<div class="screen s8">
  <label for="p9">my baby's really here</label>
</div>

<div class="screen s9">
  <label for="p1">click here to start over</label>
</div>


  </body>
</html>
